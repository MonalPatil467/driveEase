<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Payment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">

            🚗 DriveEase

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card bg-dark text-white">

                <div class="card-body">

                    <h2 class="text-center mb-4">

                        Payment

                    </h2>

                    <div class="mb-3">

                        <label class="form-label">

                            Booking ID

                        </label>

                        <input
                                type="text"
                                id="bookingId"
                                class="form-control"
                                readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Amount

                        </label>

                        <input
                                type="text"
                                id="amount"
                                class="form-control"
                                readonly>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Payment Method

                        </label>

                        <select
                                id="paymentMethod"
                                class="form-select">

                            <option value="UPI">

                                UPI

                            </option>

                            <option value="CARD">

                                Debit / Credit Card

                            </option>

                            <option value="NET_BANKING">

                                Net Banking

                            </option>

                            <option value="CASH">

                                Cash

                            </option>

                        </select>

                    </div>

                    <button
                            id="payBtn"
                            class="btn btn-secondary w-100">

                        Pay Now

                    </button>

                    <div
                            id="message"
                            class="text-danger text-center mt-3">

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/payment.js"></script>

</body>

</html>
