<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Vehicle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">

            🚗 DriveEase

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-6">

            <div class="card bg-dark text-white">

                <div class="card-body">

                    <h2 class="text-center mb-4">

                        Book Vehicle

                    </h2>

                    <div class="mb-3">

                        <label class="form-label">

                            Pickup Date

                        </label>

                        <input
                                type="date"
                                id="pickupDate"
                                class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Return Date

                        </label>

                        <input
                                type="date"
                                id="returnDate"
                                class="form-control">

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Total Amount

                        </label>

                        <input
                                type="text"
                                id="totalAmount"
                                class="form-control"
                                readonly>

                    </div>

                    <button
                            class="btn btn-secondary w-100"
                            id="bookBtn">

                        Confirm Booking

                    </button>

                    <div
                            id="message"
                            class="mt-3 text-danger text-center">

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/booking.js"></script>

</body>

</html>
