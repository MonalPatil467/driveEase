<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Owner Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">

            🚗 DriveEase

        </a>

        <div>

            <button class="btn btn-outline-light me-2"
                    onclick="window.location.href='add-vehicle.html'">

                Add Vehicle

            </button>

            <button class="btn btn-danger"
                    onclick="logout()">

                Logout

            </button>

        </div>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="text-center text-white mb-4">

        Owner Dashboard

    </h2>

    <div class="row mb-4">

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Total Vehicles</h5>

                    <h2 id="vehicleCount">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Total Bookings</h5>

                    <h2 id="bookingCount">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Total Revenue</h5>

                    <h2 id="revenue">₹0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Average Rating</h5>

                    <h2 id="rating">0</h2>

                </div>

            </div>

        </div>

    </div>

    <h3 class="text-white mb-3">

        My Vehicles

    </h3>

    <div class="row"
         id="vehicleContainer">

    </div>

</div>

<script src="js/owner-dashboard.js"></script>

</body>

</html>
