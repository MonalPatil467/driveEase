<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Vehicle Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">

            🚗 DriveEase

        </a>

        <a href="index.html"
           class="btn btn-outline-light">

            Back

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row">

        <div class="col-lg-6">

            <img id="vehicleImage"
                 class="img-fluid rounded shadow w-100">

        </div>

        <div class="col-lg-6 text-white">

            <h2 id="vehicleName"
                class="mb-3"></h2>

            <table class="table table-dark table-bordered">

                <tr>

                    <th>Brand</th>

                    <td id="brand"></td>

                </tr>

                <tr>

                    <th>Model</th>

                    <td id="model"></td>

                </tr>

                <tr>

                    <th>Vehicle Type</th>

                    <td id="vehicleType"></td>

                </tr>

                <tr>

                    <th>Fuel Type</th>

                    <td id="fuelType"></td>

                </tr>

                <tr>

                    <th>Transmission</th>

                    <td id="transmission"></td>

                </tr>

                <tr>

                    <th>Color</th>

                    <td id="color"></td>

                </tr>

                <tr>

                    <th>Manufacturing Year</th>

                    <td id="year"></td>

                </tr>

                <tr>

                    <th>Seating Capacity</th>

                    <td id="capacity"></td>

                </tr>

                <tr>

                    <th>Location</th>

                    <td id="location"></td>

                </tr>

                <tr>

                    <th>Availability</th>

                    <td id="available"></td>

                </tr>

                <tr>

                    <th>Price / Day</th>

                    <td>

                        ₹<span id="price"></span>

                    </td>

                </tr>

            </table>

            <h5 class="mt-4">

                Description

            </h5>

            <p id="description"></p>

            <a id="bookBtn"
               class="btn btn-secondary mt-3">

                Book Now

            </a>

        </div>

    </div>

</div>

<script src="js/vehicles-info.js"></script>

</body>

</html>
