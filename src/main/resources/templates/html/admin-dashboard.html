<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">

            🚗 DriveEase

        </a>

        <button class="btn btn-danger"
                onclick="logout()">

            Logout

        </button>

    </div>

</nav>

<div class="container mt-5">

    <h2 class="text-center text-white mb-4">

        Admin Dashboard

    </h2>

    <div class="row mb-4">

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Users</h5>

                    <h2 id="users">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Vehicles</h5>

                    <h2 id="vehicles">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Bookings</h5>

                    <h2 id="bookings">0</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card bg-dark text-white text-center">

                <div class="card-body">

                    <h5>Revenue</h5>

                    <h2 id="revenue">₹0</h2>

                </div>

            </div>

        </div>

    </div>

    <div class="card bg-dark text-white">

        <div class="card-header">

            <h4>All Users</h4>

        </div>

        <div class="card-body">

            <table class="table table-dark table-hover">

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Role</th>

                </tr>

                </thead>

                <tbody id="userTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="js/admin-dashboard.js"></script>

</body>

</html>
