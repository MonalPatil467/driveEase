<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Add Vehicle</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">

    <div class="container">

        <a class="navbar-brand"
           href="index.html">

            🚗 DriveEase

        </a>

    </div>

</nav>

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card bg-dark text-white">

                <div class="card-body">

                    <h2 class="text-center mb-4">

                        Add New Vehicle

                    </h2>

                    <div class="row">

                        <div class="col-md-6 mb-3">

                            <label>Brand</label>

                            <input
                                    type="text"
                                    id="brand"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Model</label>

                            <input
                                    type="text"
                                    id="model"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Registration Number</label>

                            <input
                                    type="text"
                                    id="registrationNumber"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Manufacturing Year</label>

                            <input
                                    type="number"
                                    id="manufacturingYear"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Color</label>

                            <input
                                    type="text"
                                    id="color"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Vehicle Type</label>

                            <select
                                    id="vehicleType"
                                    class="form-select">

                                <option>CAR</option>
                                <option>BIKE</option>
                                <option>SUV</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Fuel Type</label>

                            <select
                                    id="fuelType"
                                    class="form-select">

                                <option>PETROL</option>
                                <option>DIESEL</option>
                                <option>ELECTRIC</option>
                                <option>CNG</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Transmission</label>

                            <select
                                    id="transmission"
                                    class="form-select">

                                <option>MANUAL</option>
                                <option>AUTOMATIC</option>

                            </select>

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Seating Capacity</label>

                            <input
                                    type="number"
                                    id="seatingCapacity"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Price Per Day</label>

                            <input
                                    type="number"
                                    id="pricePerDay"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Location</label>

                            <input
                                    type="text"
                                    id="location"
                                    class="form-control">

                        </div>

                        <div class="col-md-6 mb-3">

                            <label>Image URL</label>

                            <input
                                    type="text"
                                    id="imageUrl"
                                    class="form-control">

                        </div>

                        <div class="col-12 mb-3">

                            <label>Description</label>

                            <textarea
                                    id="description"
                                    rows="4"
                                    class="form-control"></textarea>

                        </div>

                    </div>

                    <button
                            class="btn btn-secondary w-100"
                            id="addVehicleBtn">

                        Add Vehicle

                    </button>

                    <div
                            id="message"
                            class="text-danger mt-3">

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="js/add-vehicle.js"></script>

</body>

</html>
